<!DOCTYPE html>
<html>
<head>
<title>Weather AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    height: 100vh;

    /* 🔥 CINEMATIC BACKGROUND */
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);

    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN CONTAINER */
.container {
    width: 950px;
    height: 520px;

    display: flex;
    border-radius: 30px;
    overflow: hidden;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(30px);

    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

/* LEFT SIDE */
.left {
    width: 50%;
    padding: 50px;
    color: white;

    display: flex;
    flex-direction: column;
    justify-content: center;
}

.left h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

.left p {
    opacity: 0.7;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    background: linear-gradient(180deg, #4facfe, #00f2fe);

    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* WEATHER ICON */
.right img {
    width: 220px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0); }
}

/* BUTTONS TOP RIGHT */
.top-buttons {
    position: absolute;
    top: 20px;
    right: 20px;
}

/* 3D BUTTONS */
.btn {
    padding: 10px 22px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    margin-left: 10px;

    transition: 0.3s;
}

.login-btn {
    background: linear-gradient(145deg, #ffeaa7, #f6e58d);
    box-shadow: 0 0 15px rgba(255, 234, 167, 0.6);
}

.signup-btn {
    background: linear-gradient(145deg, #dfe6e9, #b2bec3);
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(255,255,255,0.8);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* MODAL BOX */
.modal-box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);

    width: 320px;
    padding: 30px;
    margin: 10% auto;
    border-radius: 20px;
    text-align: center;
    color: white;

    animation: pop 0.3s ease;
}

@keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

.submit {
    background: #4facfe;
    color: white;
}

/* ERROR TOAST */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: red;
    padding: 15px;
    color: white;
    border-radius: 10px;
    display: none;
}

/* MOBILE */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
        width: 95%;
        height: auto;
    }

    .left, .right {
        width: 100%;
        text-align: center;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1>Weather AI 🌦️</h1>
        <p>Real-time weather insights with smart predictions</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="top-buttons">
            <button class="btn login-btn" onclick="openModal('login')">Login</button>
            <button class="btn signup-btn" onclick="openModal('signup')">Sign Up</button>
        </div>

        <img src="https://cdn-icons-png.flaticon.com/512/1779/1779940.png">
    </div>

</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
    <div class="modal-box">
        <h3>Login</h3>
        <form method="POST" action="/">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="submit">Login</button>
        </form>
        {% if error %}
        <p style="color: #ff6b6b; margin-top: 10px; font-size: 12px;">Invalid username or password</p>
        {% endif %}
        <button onclick="closeModal('login')" style="background: #666; width: 90%; padding: 8px; margin-top: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold;">Close</button>
    </div>
</div>

<!-- SIGNUP MODAL -->
<div id="signupModal" class="modal">
    <div class="modal-box">
        <h3>Sign Up</h3>
        <form method="POST" action="/signup">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password (min 4 chars)" required minlength="4">
            <button type="submit" class="submit">Create</button>
        </form>
        {% if error %}
        <p style="color: #ff6b6b; margin-top: 10px; font-size: 12px;">Username already exists or invalid input</p>
        {% endif %}
        <button onclick="closeModal('signup')" style="background: #666; width: 90%; padding: 8px; margin-top: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold;">Close</button>
    </div>
</div>

<script>
function openModal(type) {
    if (type === 'login') {
        document.getElementById("loginModal").style.display = "block";
        document.getElementById("signupModal").style.display = "none";
    } else {
        document.getElementById("signupModal").style.display = "block";
        document.getElementById("loginModal").style.display = "none";
    }
}

function closeModal(type) {
    if (type === 'login') {
        document.getElementById("loginModal").style.display = "none";
    } else {
        document.getElementById("signupModal").style.display = "none";
    }
}

// Close modal when clicking outside
window.onclick = function(event) {
    let loginModal = document.getElementById("loginModal");
    let signupModal = document.getElementById("signupModal");
    if (event.target == loginModal) loginModal.style.display = "none";
    if (event.target == signupModal) signupModal.style.display = "none";
}

// Close modals on Escape key
document.addEventListener('keydown', function(event) {
    if (event.key === "Escape") {
        document.getElementById("loginModal").style.display = "none";
        document.getElementById("signupModal").style.display = "none";
    }
});
</script>

</body>
</html>
